<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <section style="max-width: 400px; margin: 6rem auto; padding: 2rem;">
        <p class="section-label">Admin login</p>

        {% if error %}
            <p style="color: red; font-size: 14px; margin-bottom: 1rem;">{{ error }}</p>
        {% endif %}

        <form method="POST" action="/admin/login" style="display: grid; gap: 14px;">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required />
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required />
            </div>
            <button type="submit" class="btn-primary">Log in</button>
        </form>
    </section>
</body>
</html>
